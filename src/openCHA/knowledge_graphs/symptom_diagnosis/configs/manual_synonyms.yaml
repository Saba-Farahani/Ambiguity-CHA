# manual_synonyms.yaml
# ---------------------
# Manual alias mappings for dataset-specific terms that UMLS
# cannot match automatically via normalized string lookup.
#
# Format:
#   "normalized dataset term": ["alias1", "alias2", ...]
#
# Rules:
#   - All strings must be lowercase
#   - No parenthetical qualifiers
#   - Only clinically defensible aliases
#   - Add new entries when alignment_report.txt shows a missing term
#
# Organized by clinical group for maintainability.
# ─────────────────────────────────────────────────────────────


# ─────────────────────────────────────────────────────────────
# COMPOUND SLASH TERMS
# Dataset uses "A/B Word" patterns that UMLS does not recognize.
# ─────────────────────────────────────────────────────────────

"runny/stuffy nose":
  - "runny nose"
  - "stuffy nose"
  - "nasal congestion"
  - "rhinorrhea"
  - "nasal discharge"

"nausea/vomiting":
  - "nausea"
  - "vomiting"
  - "nausea and vomiting"
  - "emesis"

"tendency to nausea and vomiting":
  - "nausea"
  - "vomiting"
  - "nausea and vomiting"

"inability to focus/concentrate":
  - "poor concentration"
  - "inattention"
  - "concentration difficulty"

"delayed verbal/language skills":
  - "language delay"
  - "speech delay"
  - "verbal delay"


